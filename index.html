        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .center-image {
            width: 400px;
            height: 400px;
            animation: pulse 2s infinite, slideUp 1.5s ease-out;
            margin-top: 40px;
            z-index: 10;
            position: relative;
        }
        
        @keyframes slideUp {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .flower-image {
            position: fixed;
            width: 70px;
            height: 70px;
            animation: float 6s infinite, fade 3s infinite;
            z-index: 1;
        }
        
        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-30px); opacity: 0; }
        }
        
        @keyframes fade {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        /* Vị trí các hình hoa xung quanh */

    <script>
        // Hiệu ứng pháo hoa
        function createFirework(x, y) {
            const colors = ['#ff69b4', '#ff1493', '#ff69b4', '#ffb6c1', '#ff00ff', '#ffc0cb'];
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 5 + Math.random() * 8;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                document.body.appendChild(particle);
                
                let posX = x;
                let posY = y;
                let life = 1;
                let velX = vx;
                let velY = vy;
                
                const animate = () => {
                    posX += velX;
                    posY += velY;
                    velY += 0.1; // Trọng lực
                    life -= 0.015;
                    
                    particle.style.left = posX + 'px';
                    particle.style.top = posY + 'px';
                    particle.style.opacity = life;
                    
                    if (life > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };
                animate();
            }
        }
        
        // Hiệu ứng hoa rơi (confetti)
        function createConfetti() {
            const confettiPiece = document.createElement('div');
            confettiPiece.className = 'confetti';
            
            const colors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ff00ff', '#ffc0cb'];
            const shapes = ['circle', 'square'];
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            
            confettiPiece.style.left = Math.random() * 100 + '%';
            confettiPiece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confettiPiece.style.width = (Math.random() * 10 + 5) + 'px';
            confettiPiece.style.height = (Math.random() * 10 + 5) + 'px';
            
            if (shape === 'circle') {
                confettiPiece.style.borderRadius = '50%';
            }
            
            document.body.appendChild(confettiPiece);
            
            setTimeout(() => confettiPiece.remove(), 3000);
        }
        
        // Tạo hiệu ứng lúc load trang
        window.addEventListener('load', () => {
            // Tạo pháo hoa từ nhiều điểm
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    createFirework(window.innerWidth / 2 + (Math.random() - 0.5) * 400, 
                                   window.innerHeight / 4 + (Math.random() - 0.5) * 200);
                }, i * 300);
            }
        });
        
        // Khi click chuột, tạo pháo hoa tại vị trí click
        document.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
            
            // Tạo hoa rơi nhiều
            for (let i = 0; i < 15; i++) {
                createConfetti();
            }
        });
        
        // Tạo hoa rơi liên tục
        setInterval(createConfetti, 200);
        
        // Tạo pháo hoa random mỗi 1.5 giây (nhiều hơn)
        setInterval(() => {
            createFirework(Math.random() * window.innerWidth, Math.random() * window.innerHeight / 2);
        }, 1500);
        
        // Thêm pháo hoa tự động mỗi 3 giây
        setInterval(() => {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createFirework(Math.random() * window.innerWidth, Math.random() * window.innerHeight / 3);
                }, i * 300);
            }
